[pytest]
# Default run is headless + offline. Live-editor and live-MCP tests are opt-in only.
addopts = -ra -m "not editor and not mcp"
markers =
    editor: requires a running Unreal Editor + live Web Remote Control; excluded from the default headless run (run manually with `pytest -m editor`).
    mcp: requires a live MCP / FastMCP runtime to resolve tools over a real connection; excluded from the default headless run (run manually with `pytest -m mcp`).
testpaths =
    packages
    tests
